<section id="contact">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">Questions?</h2>
                <h3 class="section-subheading text-muted">
                    Questions regarding participant nominations, accreditation, workshop logistics, or the agenda? We will respond as soon as possible.
                </h3>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-12">
                <form name="sentMessage" id="contactForm" action="https://formspree.io/hello.world@gmail.com" method="POST" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="control-group form-group">
                                <input type="text" class="form-control" name="name" placeholder="Your Name *" id="name" required data-validation-required-message="Please enter your name.">
                                <p class="help-block text-danger"></p>
                            </div>

                            <div class="control-group form-group">
                                <input type="email" class="form-control" name="_replyto" placeholder="Your Email *" id="email" required data-validation-required-message="Please enter your email address.">
                                <p class="help-block text-danger"></p>
                            </div>

                            <div class="control-group form-group">
                                <input type="text" class="form-control" name="organization" placeholder="Organization / Ministry" id="organization">
                                <p class="help-block text-danger"></p>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="control-group form-group">
                                <textarea class="form-control" name="message" placeholder="Please enter your question regarding participant nominations, accreditation, workshop logistics, or the agenda." id="message" required data-validation-required-message="Please enter your question."></textarea>
                                <p class="help-block text-danger"></p>
                            </div>
                        </div>

                        <div class="clearfix"></div>

                        <div class="col-lg-12 text-center">
                            <div id="success"></div>
                            <button type="submit" value="Send" class="btn btn-xl">Submit Question</button>
                        </div>

                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
